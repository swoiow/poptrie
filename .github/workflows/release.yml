name: Release

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      release_mode:
        description: "Release mode"
        required: false
        default: "latest"
        type: choice
        options:
          - latest
          - cron
      private_src_ref:
        description: "Private source repository ref"
        required: false
        default: "main"
  schedule:
    - cron: "0 1 */14 * *"

defaults:
  run:
    shell: bash

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: true

jobs:
  cleanup_old_releases:
    runs-on: ubuntu-latest
    if: github.event_name == 'schedule' || (github.event_name == 'workflow_dispatch' && inputs.release_mode == 'cron')
    steps:
      - name: Cleanup old cron releases
        uses: actions/github-script@v8
        with:
          script: |
            const releases = await github.paginate(github.rest.repos.listReleases, {
              owner: context.repo.owner,
              repo: context.repo.repo,
              per_page: 100,
            });
            const cronReleases = releases
              .filter((release) => release.tag_name.startsWith("cron-"))
              .sort((a, b) => new Date(b.created_at) - new Date(a.created_at));
            const toDelete = cronReleases.slice(3);
            for (const release of toDelete) {
              await github.rest.repos.deleteRelease({
                owner: context.repo.owner,
                repo: context.repo.repo,
                release_id: release.id,
              });
              await github.rest.git.deleteRef({
                owner: context.repo.owner,
                repo: context.repo.repo,
                ref: `tags/${release.tag_name}`,
              });
            }

  build_wheels:
    if: github.event_name == 'push' || (github.event_name == 'workflow_dispatch' && inputs.release_mode == 'latest')
    uses: ./.github/workflows/build-wheels.yml
    with:
      private_src_repo_slug: ${{ vars.POPTRIE_PRIVATE_REPO_SLUG }}
      private_src_ref: ${{ inputs.private_src_ref || vars.POPTRIE_PRIVATE_REPO_REF || 'main' }}
    secrets:
      poptrie_private_repo_token: ${{ secrets.GH_POPTRIE_TOKEN }}

  build_data:
    uses: ./.github/workflows/build-data.yml
    with:
      private_src_repo_slug: ${{ vars.POPTRIE_PRIVATE_REPO_SLUG }}
      private_src_ref: ${{ inputs.private_src_ref || vars.POPTRIE_PRIVATE_REPO_REF || 'main' }}
    secrets:
      poptrie_private_repo_token: ${{ secrets.GH_POPTRIE_TOKEN }}

  publish_latest:
    runs-on: ubuntu-latest
    needs: [ build_wheels, build_data ]
    if: github.event_name == 'push' || (github.event_name == 'workflow_dispatch' && inputs.release_mode == 'latest')
    steps:
      - name: Remove latest release
        uses: actions/github-script@v8
        with:
          script: |
            try {
              const release = await github.rest.repos.getReleaseByTag({
                owner: context.repo.owner,
                repo: context.repo.repo,
                tag: "latest",
              });
              await github.rest.repos.deleteRelease({
                owner: context.repo.owner,
                repo: context.repo.repo,
                release_id: release.data.id,
              });
              await github.rest.git.deleteRef({
                owner: context.repo.owner,
                repo: context.repo.repo,
                ref: "tags/latest",
              });
            } catch (error) {
              if (error.status !== 404) {
                throw error;
              }
            }

      - name: Download wheels
        uses: actions/download-artifact@v8
        with:
          path: dist
          pattern: wheels-*
          merge-multiple: true

      - name: Download data artifacts
        uses: actions/download-artifact@v8
        with:
          name: data-artifacts
          path: dist

      - name: Publish latest release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          name: latest
          body: |
            ## Overlap Report Note

            Files such as `*-overlap.csv` are input conflict audit reports.
            They record overlaps found in the source geoip datasets before hole-punching and conflict resolution.
            They do **not** mean the final exported `.dat` files still contain overlapping CIDRs.

          generate_release_notes: true
          fail_on_unmatched_files: false
          files: |
            dist/*.whl
            dist/geo-cn.dat
            dist/bgp-geoip.dat
            dist/iana-geoip.dat
            dist/geo-cn-overlap.csv
            dist/bgp-geoip-overlap.csv
            dist/iana-geoip-overlap.csv

  publish_cron:
    runs-on: ubuntu-latest
    needs: [ cleanup_old_releases, build_data ]
    if: github.event_name == 'schedule' || (github.event_name == 'workflow_dispatch' && inputs.release_mode == 'cron')
    steps:
      - name: Download data artifacts
        uses: actions/download-artifact@v8
        with:
          name: data-artifacts
          path: dist

      - name: Set release tag
        run: echo "CRON_TAG=cron-$(date -u +%Y%m%d)" >> $GITHUB_ENV

      - name: Publish cron release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.CRON_TAG }}
          name: ${{ env.CRON_TAG }}
          body: |
            ## Overlap Report Note

            Files such as `*-overlap.csv` are input conflict audit reports.
            They record overlaps found in the source geoip datasets before hole-punching and conflict resolution.
            They do **not** mean the final exported `.dat` files still contain overlapping CIDRs.

          fail_on_unmatched_files: false
          files: |
            dist/geo-cn.dat
            dist/bgp-geoip.dat
            dist/iana-geoip.dat
            dist/geo-cn-overlap.csv
            dist/bgp-geoip-overlap.csv
            dist/iana-geoip-overlap.csv
