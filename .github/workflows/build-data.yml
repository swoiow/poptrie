name: Build Data

on:
  workflow_call:
    inputs:
      private_src_repo_slug:
        description: "Private source repository slug"
        required: true
        type: string
      private_src_ref:
        description: "Private source repository ref"
        required: false
        default: "main"
        type: string
    secrets:
      poptrie_private_repo_token:
        description: "Token for private repository checkout"
        required: true
  workflow_dispatch:
    inputs:
      private_src_ref:
        description: "Private source repository ref"
        required: false
        default: "main"

defaults:
  run:
    shell: bash

jobs:
  build:
    runs-on: ubuntu-latest

    env:
      PYTHONIOENCODING: "utf-8"
      PYTHONUTF8: "1"
      PRIVATE_SRC_REPO_SLUG: ${{ inputs.private_src_repo_slug || vars.POPTRIE_PRIVATE_REPO_SLUG }}
      PRIVATE_SRC_REF: ${{ inputs.private_src_ref || 'main' }}
      DIST_DIR: ${{ github.workspace }}/dist

    steps:
      - name: Checkout public repo
        uses: actions/checkout@v6

      - name: Checkout private repo
        uses: actions/checkout@v6
        with:
          repository: ${{ env.PRIVATE_SRC_REPO_SLUG }}
          token: ${{ secrets.poptrie_private_repo_token || secrets.GH_POPTRIE_TOKEN }}
          ref: ${{ env.PRIVATE_SRC_REF }}
          path: private-src

      - name: Set up Python 3.14
        uses: actions/setup-python@v6
        with:
          python-version: "3.14"

      - name: Set up Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            private-src/target/
          key: ubuntu-cargo-${{ hashFiles('private-src/Cargo.toml') }}
          restore-keys: |
            ubuntu-cargo-

      - name: Create venv
        run: |
          python -m venv .venv
          echo "PYTHON_EXEC=$PWD/.venv/bin/python" >> $GITHUB_ENV

      - name: Install build deps
        run: $PYTHON_EXEC -m pip install --upgrade pip

      - name: Build data artifacts
        env:
          POPTRIE_PRIVATE_SRC: ${{ github.workspace }}/private-src
        run: |
          mkdir -p "$DIST_DIR"
          $PYTHON_EXEC .github/scripts/build_cn_bin.py \
            --cn-url "https://github.com/Loyalsoldier/geoip/raw/refs/heads/release/text/cn.txt" \
            --geoip-zip-url "https://github.com/Loyalsoldier/geoip/archive/refs/heads/release.zip" \
            --iana-zip-url "https://github.com/HotCakeX/Official-IANA-IP-blocks/archive/refs/heads/main.zip" \
            --out-cn "$DIST_DIR/geo-cn.dat" \
            --out-geoip "$DIST_DIR/bgp-geoip.dat" \
            --out-iana "$DIST_DIR/iana-geoip.dat"

      - name: Verify data artifacts
        run: |
          test -f "$DIST_DIR/geo-cn.dat"
          test -f "$DIST_DIR/bgp-geoip.dat"
          test -f "$DIST_DIR/iana-geoip.dat"

      - name: Upload data artifacts
        uses: actions/upload-artifact@v7
        with:
          name: data-artifacts
          path: |
            ${{ env.DIST_DIR }}/geo-cn.dat
            ${{ env.DIST_DIR }}/bgp-geoip.dat
            ${{ env.DIST_DIR }}/iana-geoip.dat
          retention-days: 3
